version: '3.8'

services:
  projectforge-gateway:
    image: micromata/projectforge-gateway:test
    ports:
      - "8090:8080"
    environment:
      - PROJECTFORGE_HOME=/ProjectForge
      - GATEWAY_SYNC_SECRET=test-secret-12345
      - JAVA_ARGS=--spring.profiles.active=external-gateway
      - DOCKER_OPTS=-Dprojectforge.base.dir=/ProjectForge -Ddocker=stack
    volumes:
      - ./ProjectForge:/ProjectForge
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: projectforge
      POSTGRES_USER: projectforge
      POSTGRES_PASSWORD: projectforge-gw-pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
