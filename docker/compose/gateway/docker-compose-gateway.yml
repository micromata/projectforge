version: '3.8'

services:
  nginx:
    image: docker.io/library/nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/webroot:/var/www/certbot:ro
    depends_on:
      - projectforge-gateway
    restart: unless-stopped

  certbot:
    image: docker.io/certbot/certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done'
    restart: unless-stopped

  projectforge-gateway:
    image: micromata/projectforge-gateway:test
    expose:
      - "8080"
    environment:
      - PROJECTFORGE_HOME=/ProjectForge
      - GATEWAY_SYNC_SECRET=test-secret-12345
      - JAVA_ARGS=--spring.profiles.active=external-gateway
      - DOCKER_OPTS=-Dprojectforge.base.dir=/ProjectForge -Ddocker=stack
    volumes:
      - ./ProjectForge:/ProjectForge
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: projectforge
      POSTGRES_USER: projectforge
      POSTGRES_PASSWORD: projectforge-gw-pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
