version: '3.8'

services:
  projectforge-gateway:
    image: micromata/projectforge:latest
    build:
      context: ../../..
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=external-gateway
      - GATEWAY_SYNC_SECRET=test-secret-12345
      - DOCKER_OPTS=-Ddocker=stack
    volumes:
      - gateway-data:/ProjectForge
      - ./projectforge.properties:/ProjectForge/projectforge.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: projectforge
      POSTGRES_USER: projectforge
      POSTGRES_PASSWORD: projectforge-gw-pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  gateway-data:
  postgres-data:
