#
# ProjectForge External Gateway Profile
#
# Activate with: --spring.profiles.active=external-gateway
# This profile runs ProjectForge as a reduced public-facing instance providing only:
# - CardDAV (address book sync)
# - CalDAV/ICS subscriptions (calendar export)
# - DataTransfer (file exchange areas)
# Authentication is via OAuth2/OIDC (Authentik).
#

# Enable gateway mode
projectforge.gateway.enabled=true

# Shared secret for sync API (set via environment variable)
projectforge.gateway.sync.secret=${GATEWAY_SYNC_SECRET:}

# OAuth2/OIDC Configuration (Authentik)
spring.security.oauth2.client.registration.authentik.client-id=${AUTHENTIK_CLIENT_ID:}
spring.security.oauth2.client.registration.authentik.client-secret=${AUTHENTIK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.authentik.scope=openid,profile,email
spring.security.oauth2.client.registration.authentik.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.authentik.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.authentik.issuer-uri=${AUTHENTIK_ISSUER_URI:}

# Disable all menu items except DataTransfer
projectforge.menu.visibility.access=NONE
projectforge.menu.visibility.addresses=NONE
